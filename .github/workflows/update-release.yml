name: Update Release sendbuilds

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag of the existing release to update (e.g., v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: build-and-release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: sendbuilds-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            asset_name: sendbuilds-i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            asset_name: sendbuilds-x86_64-pc-windows-gnu.exe
          - os: ubuntu-latest
            target: i686-pc-windows-gnu
            asset_name: sendbuilds-i686-pc-windows-gnu.exe
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: sendbuilds-x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: sendbuilds-aarch64-apple-darwin

    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux i686 toolchain
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib

      - name: Install MinGW for Windows GNU targets
        if: contains(matrix.target, 'windows-gnu')
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build sendbuilds
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN_PATH="target/${{ matrix.target }}/release/sendbuilds"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BIN_PATH="${BIN_PATH}.exe"
          fi
          cp "$BIN_PATH" "dist/${{ matrix.asset_name }}"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${{ matrix.asset_name }}" > "dist/${{ matrix.asset_name }}.sha256"
          else
            shasum -a 256 "dist/${{ matrix.asset_name }}" > "dist/${{ matrix.asset_name }}.sha256"
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          overwrite_files: true
