name: Update Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to update (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: sendbuilds-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            asset_name: sendbuilds-i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            asset_name: sendbuilds-x86_64-pc-windows-gnu.exe
          - os: ubuntu-latest
            target: i686-pc-windows-gnu
            asset_name: sendbuilds-i686-pc-windows-gnu.exe
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: sendbuilds-x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: sendbuilds-aarch64-apple-darwin

    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install deps (Linux i686)
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib

      - name: Install MinGW
        if: contains(matrix.target, 'windows-gnu')
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          BIN="target/${{ matrix.target }}/release/sendbuilds"
          [[ "${{ matrix.target }}" == *windows* ]] && BIN="$BIN.exe"

          cp "$BIN" "dist/${{ matrix.asset_name }}"

          sha256sum "dist/${{ matrix.asset_name }}" > "dist/${{ matrix.asset_name }}.sha256"

      - name: Update release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          overwrite: true
