[build]
# install_cmd = "pnpm install --frozen-lockfile --prefer-offline"
# build_cmd   = "pnpm run build"
# optional: run independent build tasks in parallel
# parallel_build_cmds = ["pnpm run build:client", "pnpm run build:server"]
# output_dir  = ".next"

[deploy]
artifact_dir = "./artifacts"
# targets = ["static_site", "tarball", "serverless_function", "container_image", "kubernetes"]
# container_image = "sendara-landing:latest"
# container_platforms = ["linux/amd64", "linux/arm64"]
# push_container = false
# rebase_base = "gcr.io/distroless/nodejs20-debian12"

# [deploy.kubernetes]
# enabled = true
# namespace = "default"
# replicas = 2
# container_port = 3000
# service_port = 80
# image_pull_policy = "IfNotPresent"

# [deploy.gc]
# enabled = true
# keep_last = 5
# max_age_days = 14

[output]
# set true to show machine-readable EVENT lines
events = false

[cache]
enabled = true
dir = "./artifacts/.sendbuild-cache"
# registry_ref = "ghcr.io/your-org/your-app-buildcache"

[scan]
enabled = false
command = "npm audit --json --omit=dev --audit-level=high"

[security]
enabled = true
fail_on_critical = true
critical_threshold = 0
generate_sbom = true
auto_distroless = true
# distroless_base = "gcr.io/distroless/nodejs20-debian12"
# rewrite_dockerfile_in_place = false

[sandbox]
enabled = true

[signing]
enabled = false
key_env = "SENDBUILD_SIGNING_KEY"
# auto_generate_key = true
# key_file = ".sendbuild/signing.key"
# generate_provenance = true
# cosign = false
# cosign_key = "env://COSIGN_PRIVATE_KEY"

env_from_host = ["GITHUB_TOKEN"]

[compatibility]
# target_os = "linux"
# target_arch = "x86_64"
# target_node_major = 20

[env]
NODE_ENV = "production"
